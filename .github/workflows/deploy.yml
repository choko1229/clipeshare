name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Prepare SSH key
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          test -n "${VPS_HOST}" || (echo "Missing GitHub secret: VPS_HOST" && exit 1)
          test -n "${VPS_SSH_PRIVATE_KEY}" || (echo "Missing GitHub secret: VPS_SSH_PRIVATE_KEY" && exit 1)
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${VPS_SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -T 15 -H "${VPS_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          APP_NAME: ${{ vars.APP_NAME || 'clipeshare' }}
          APP_DIR: ${{ vars.APP_DIR || '/var/www/clipeshare' }}
          BRANCH: ${{ github.ref_name }}
        run: |
          test -n "${VPS_HOST}" || (echo "Missing GitHub secret: VPS_HOST" && exit 1)
          test -n "${VPS_USER}" || (echo "Missing GitHub secret: VPS_USER" && exit 1)
          ssh "${VPS_USER}@${VPS_HOST}" \
            "APP_NAME='${APP_NAME}' APP_DIR='${APP_DIR}' BRANCH='${BRANCH}' bash '${APP_DIR}/current/scripts/deploy-server.sh'"
